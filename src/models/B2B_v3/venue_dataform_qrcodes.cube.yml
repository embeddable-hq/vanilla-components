cubes: 
  - name: venue_dataform_qrcodes
    data_source: default
    sql: >
      select
        event_date
        ,event_params_custom.event_custom_timestamp
        ,time.event_timestamp
        --,if(event_params_custom.event_custom_timestamp is null, timestamp_micros(time.event_timestamp), timestamp_seconds(event_params_custom.event_custom_timestamp)) as event_timestamp
        ,user_pseudo_id
        ,event_name
        ,stream_id
        ,is_measurement_protocol_hit
        ,device.category as device_category
        --,device.web_info.hostname as hostname
        ,geo.country
        --,device.language as device_language
        ,event_params_custom.client_connectivity
        --,event_params_custom.content_category
        --,event_params_custom.page_type
        ,event_params_custom.venue_id
        ,event_params_custom.organisation_id
        ,event_params_custom.qrcode_id
        ,event_params_custom.qrcode_label
        --,event_params_custom.qrcode_url
      from `smartify-cc94e.superform_outputs_151371783.ga4_events` as a
      where event_params_custom.organisation_id = '{COMPILE_CONTEXT.securityContext.organisation_id}'
        /*
        and ('{COMPILE_CONTEXT.securityContext.venue_id}' IS NULL
            or '{COMPILE_CONTEXT.securityContext.venue_id}' = ''
            or '{COMPILE_CONTEXT.securityContext.venue_id}' = 'undefined'
            or event_params_custom.venue_id in unnest(split('{COMPILE_CONTEXT.securityContext.venue_id}', ',')))
        */      
        and event_name in ("qrcode_open")
        and event_date >= DATE_SUB(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL 13 MONTH)
        and (stream_id in ('1047860117','1047860114','1913717213','2817285551','10374153553') or (stream_id = '4029517643' and event_params_custom.organisation_id = 'org_ukparliament'))

    dimensions:
      - name: datetime
        type: time
        # sql: if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp))
        # 👆 Above it is the previous way of calculating the time of the event, without taking in consideration the timezone of the venue.
        # 👇 Below is the new way, which adjusts the event time to the local time of the venue.
        # sql: >
        #   TIMESTAMP_ADD(
        #       if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),
        #       INTERVAL CAST(CAST(IFNULL({venue_lookup_timezone.timezone_offset}, 0) AS FLOAT64) * 3600 AS INT64) SECOND
        #     )
        # 👇 Below is the newest way, which adjusts the event time only for the selected organisations.
        sql: >
          case 
            when organisation_id in ('org_yale', 'org_princetonuam') then TIMESTAMP_ADD(if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),INTERVAL -5 * 3600 SECOND)
            when organisation_id in ('org_mfahouston') then TIMESTAMP_ADD(if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),INTERVAL -6 * 3600 SECOND)
            when organisation_id in ('org_nhb') then TIMESTAMP_ADD(if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),INTERVAL 8 * 3600 SECOND)
            else if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp))
          end
      
      # - name: datetime_local
      #   type: time
      #   title: Local DateTime
      #   sql: >
      #     TIMESTAMP_ADD(
      #       if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),
      #       INTERVAL CAST(CAST(IFNULL({venue_lookup_timezone.timezone_offset}, 0) AS FLOAT64) * 3600 AS INT64) SECOND
      #     )

      - name: user_connectivity
        type: string
        sql: |-
          case
            when (client_connectivity = '' or client_connectivity is null) then 'Unknown'
            when client_connectivity in ('WIFI', 'Internet Corporate', 'Internet Highspeed') then 'Wi-Fi'
            else 'Cellular'
          end
        
      - name: device_platform
        type: string
        sql: |-
          case
            when stream_id = '1047860117' then 'iOS'
            when stream_id = '1047860114' then 'Android'
            when (stream_id = '1913717213' and device_category in ('tablet','desktop')) then 'Desktop'
            when (stream_id = '10374153553' or (stream_id = '1913717213' and event_custom_timestamp is not null)) then 'Hardware'
            else 'Webapp'
          end

      - name: country
        type: string
        sql: if(country = '', 'Unknown', country)

      - name: organisation_id
        type: string
        sql: organisation_id
        primaryKey: true
        shown: true

      - name: venue_id
        type: string
        sql: case when (venue_id = "" or venue_id is null) then "No linked venue" else venue_id end

      - name: qrcode_id
        type: string
        sql: qrcode_id
        title: "QR Code ID"
        primaryKey: true
        shown: true
      
      - name: qrcode_label
        type: string
        sql: qrcode_label
        title: "QR Code Label"

    measures:
      - name: qrcode_users
        type: count_distinct_approx
        sql: user_pseudo_id
        title: "QR Code Users"

      - name: qrcode_opens
        type: count
        sql: event_name
        title: "QR Code Opens"

    joins:
      - name: venue_lookup_organisations
        relationship: many_to_one
        sql: "{CUBE.organisation_id} = {venue_lookup_organisations.org_sid}"   
    
