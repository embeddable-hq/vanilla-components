cubes:
- name: internal_dataform_game
  data_source: default
  sql: >
    select
      event_date
      ,event_params_custom.event_custom_timestamp
      ,time.event_timestamp
      --,if(event_params_custom.event_custom_timestamp is null, timestamp_micros(time.event_timestamp), timestamp_seconds(event_params_custom.event_custom_timestamp)) as event_timestamp
      ,user_pseudo_id
      ,event_name
      ,stream_id
      ,device.category as device_category
      ,device.language as device_language
      ,geo.country
      ,event_params_custom.client_connectivity
      --,safe_cast(user_properties.user_age as int64) as user_age
      --,user_properties.user_gender
      --,ifnull(user_properties.user_logged, 'false') as user_logged
      ,event_params_custom.page_type
      ,event_params_custom.page_path
      ,event_params_custom.page_category
      ,event_params_custom.page_subdomain
      --,event_params_custom.venue_id
      ,event_params_custom.organisation_id
      ,event_params_custom.game_id
      ,event_params_custom.level_id
      ,event_params_custom.question_id
      ,event_params_custom.answer_id
      ,event_params_custom.progress_step
      ,event_params_custom.success
      ,"User Type" as user_type
    from `smartify-cc94e.superform_outputs_151371783.ga4_events`
    where event_params_custom.organisation_id = '{COMPILE_CONTEXT.securityContext.organisation_id}'
      and event_params_custom.game_id is not null
      --and event_date >= DATE_SUB(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL 13 MONTH)
      and event_date >= "2026-01-01"
      and (stream_id in ('1047860117','1047860114','1913717213','2817285551','10374153553') or (stream_id = '4029517643' and event_params_custom.organisation_id = 'org_ukparliament'))

  dimensions:
    - name: datetime
      type: time
      # sql: if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp))
      # 👆 Above it is the previous way of calculating the time of the event, without taking in consideration the timezone of the venue.
      # 👇 Below is the new way, which adjusts the event time to the local time of the venue.
      sql: >
        TIMESTAMP_ADD(
          if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),
          INTERVAL CAST(CAST(IFNULL({venue_lookup_timezone.timezone_offset}, 0) AS FLOAT64) * 3600 AS INT64) SECOND
        )
    
    # - name: datetime_local
    #   type: time
    #   title: Local DateTime
    #   sql: >
    #     TIMESTAMP_ADD(
    #       if(event_custom_timestamp is null, timestamp_micros(event_timestamp), timestamp_seconds(event_custom_timestamp)),
    #       INTERVAL CAST(CAST(IFNULL({venue_lookup_timezone.timezone_offset}, 0) AS FLOAT64) * 3600 AS INT64) SECOND
    #     )
    
    - name: user_connectivity
      type: string
      sql: |-
        case
          when (client_connectivity = '' or client_connectivity is null) then 'Unknown'
          when client_connectivity in ('WIFI', 'Internet Corporate', 'Internet Highspeed') then 'Wi-Fi'
          else 'Cellular'
        end
        
    - name: device_platform
      type: string
      sql: |-
        case
          when stream_id = '1047860117' then 'iOS'
          when stream_id = '1047860114' then 'Android'
          when (stream_id = '1913717213' and device_category in ('tablet','desktop')) then 'Desktop'
          when (stream_id = '10374153553' or (stream_id = '1913717213' and event_custom_timestamp is not null)) then 'Hardware'
          else 'Webapp'
        end

    - name: stream_id
      type: string
      sql: stream_id

    - name: device_language
      type: string
      sql: device_language

    - name: event_name
      type: string
      sql: event_name
  
    - name: country
      type: string
      sql: if(country = '', 'Unknown', country)
  
    - name: page_type
      type: string
      sql: page_type
  
    - name: page_path
      type: string
      sql: page_path
  
    - name: page_category
      type: string
      sql: page_category
  
    - name: page_subdomain
      type: string
      sql: page_subdomain
    
    - name: organisation_id
      type: string
      sql: organisation_id
      primaryKey: true
      shown: true

    - name: game_id
      type: string
      sql: if(contains_substr(level_id, 'game_'), level_id ,game_id)
      primaryKey: true
      shown: true

    - name: level_id
      type: string
      sql: level_id

    - name: question_id
      type: string
      sql: question_id

    - name: answer_id
      type: string
      sql: answer_id

    - name: progress_step
      type: string
      sql: progress_step

    - name: success
      type: string
      sql: success

  measures:
    - name: total_events
      type: count
    
    - name: active_user
      type: count_distinct_approx
      title: Total Users
      sql: user_pseudo_id
      filters:
        - sql: event_name not in ('view_component','email_sent', 'in_app_sent', 'email_delivered', 'email_opened', 'in_app_opened', 'in_app_clicked', 'unsubscribe', 'push_opened', 'Email_Link_Clicked', 'push_sent', 'push_delivered')
    
    - name: level_start
      type: count
      sql: event_name
      filters:
        - sql: event_name = 'level_start'
    
    - name: level_end
      type: count
      sql: event_name
      filters:
        - sql: event_name = 'level_end'
    
    - name: submit_answer
      type: count
      sql: event_name
      filters:
        - sql: event_name = 'submit_answer'
    
    - name: select_answer
      type: count
      sql: event_name
      filters:
        - sql: event_name = 'select_component'
    
    - name: level_end_success
      type: count
      sql: event_name
      filters:
        - sql: event_name = 'level_end'
        - sql: success = 'true'
    
    - name: success_rate
      type: number
      title: 'Level Completion Success Rate'
      sql: "COALESCE(CAST({level_end_success} AS FLOAT64) / NULLIF(CAST({level_start} AS FLOAT64), 0.0), 0.0)*100"

    - name: page_view
      type: count
      sql: event_name
      filters:
        - sql: event_name in ('page_view', 'screen_view')
  
  joins:
    - name: venue_lookup_games
      relationship: many_to_one
      sql: '{CUBE.game_id} = {venue_lookup_games.game_id}'
    
    - name: venue_lookup_organisations
      relationship: many_to_one
      sql: "{CUBE.organisation_id} = {venue_lookup_organisations.org_sid}"